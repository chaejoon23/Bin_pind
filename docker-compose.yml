services:
  db:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pind
      POSTGRES_USER: pind
      POSTGRES_PASSWORD: pind_local
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pind -d pind"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pind_test
      POSTGRES_USER: pind
      POSTGRES_PASSWORD: pind_local
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pind -d pind_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
